# ─────────────────────────────────────────────────────────────────────────────
# Nginx config for DEX AI Trader
# Place at: /etc/nginx/sites-available/dex-trader
# Then: sudo ln -s /etc/nginx/sites-available/dex-trader /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOUR_DOMAIN with your actual domain or EC2 public IP.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # ── Dashboard (React SPA) ─────────────────────────────────────────────────
    location / {
        root /home/ubuntu/tradeonDEX/src/dashboard/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|svg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── API (Bun HTTP server on :3001) ────────────────────────────────────────
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:3001/health;
    }
}
